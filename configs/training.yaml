# DESCARTES-PHARMA v2.0 -- docking-game training configuration

# D2: starting-pose regime for the RL agent.
#   docked            - start at Vina's docked pose (agent can only refine)
#   perturbed_docked  - Vina pose + random 3-5 A shift & rotation (DEFAULT;
#                       the interesting regime -- the agent must re-find the
#                       pocket, which Vina has not already trivially solved)
#   random            - random placement near the pocket
initial_pose_mode: perturbed_docked

# D1: docking-pose cache. Each unique ligand is docked ONCE (Phase 2.5) and the
# pose is reused, instead of re-docking every episode.
pose_cache_path: data/docked_poses_cache.json
predock_exhaustiveness: 8

# Phase 3 RL training length (the `--smoke` flag overrides these with 5 / 10).
# The old code was hardcoded to 5 episodes -- far too few for a real policy.
n_train_episodes: 500
train_max_steps: 30
